<style>
        .glass-card {
            background: rgba(19, 19, 19, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .brand-shadow {
            text-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-white">
<!-- Hero Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<img class="w-full h-full object-cover brightness-[0.4] scale-105" data-alt="cinematic high-contrast film scene of a lone silhouette walking down a moody neon-lit street at night with deep red and cyan glows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmc1nUUunvqkaKqrMsQfCo7qbO1rK1IhRrLjwoOqgfdTlIWei6x_fI-UaPr2ms5XrhPizVkhtupGJPQuiT_B74bSe6XAnTC9S7IyTFhyCo-NeakME7D3x3rsAhj4P89nis7IslnGG1VaIDFr7fo6nxOBBTCtn3gFFrytACvhfZXmSiDd24VcCBcOcq5Zs0LdMjm5VyOVF6W44XTDjwjavfmawWoHpyWjvogrEDQKDiXIRgRoy2i5YK--7i_Dc1HovRTjxEm3yZOT8"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50"></div>
</div>
<!-- Navigation Header -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent backdrop-blur-xl bg-opacity-70">
<div class="text-2xl font-black text-red-600 tracking-tighter uppercase font-headline brand-shadow">
            Obsidian Cinema
        </div>
<div>
<!-- Suppressed according to rule: Transactional screen hides full nav -->
</div>
</header>
<!-- Main Content: Login Shell -->
<main class="relative z-10 min-h-screen flex items-center justify-center px-4 pt-20 pb-12">
<div class="glass-card w-full max-w-[450px] p-10 md:p-14 rounded-xl shadow-2xl border border-outline-variant/10">
<header class="mb-10">
<h1 class="font-headline text-4xl font-bold tracking-tight text-white mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-medium text-sm">Experience cinema the way it was meant to be seen.</p>
</header>
<form class="space-y-6">
<!-- Input Group -->
<div class="space-y-4">
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5 ml-1" for="email">Email or phone number</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-lg px-4 py-3.5 text-white focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-surface-variant" id="email" placeholder="Enter your email" type="text"/>
</div>
<div class="group">
<label class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1.5 ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-lg px-4 py-3.5 text-white focus:outline-none focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-surface-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-4 rounded-lg shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Help & Remember -->
<div class="flex items-center justify-between text-xs font-medium text-on-surface-variant">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-low text-primary-container focus:ring-0 focus:ring-offset-0" type="checkbox"/>
<span class="group-hover:text-white transition-colors">Remember me</span>
</label>
<a class="hover:text-white transition-colors hover:underline underline-offset-4" href="#">Need help?</a>
</div>
<!-- Social Authentication -->
<div class="pt-6 space-y-3">
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-[10px] uppercase tracking-widest text-surface-variant font-bold">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 px-4 py-3 rounded-lg bg-surface-container-high border border-outline-variant/10 hover:bg-surface-bright transition-all text-sm font-semibold" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G icon with colorful segments on a white circle background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlYtRvCxQDwjr2Vrsi6G6SDLwP76gA8yyoVFM48pqEcXG8C-pgFdNAXflLypS6yZ0QTXysMKQx4luVQ8ioCR4ymsZkcyyKGgCv6yoNGqie9GuD4q9qUZYkpR4o8hodpNkuRJT5R0wBKK6pGiAhWFWWYYd4Mxxn_t1EkuAY0SrtykDcjuy3I657dzP7eUb-mCmQYZGMVKn4Pev1U48c3eSyv0lCc7dJmBHu-9wOAoZ52JDIUvy4Fs9i1BRwgnQMWIPnkS1M_mhsdp8"/>
                            Google
                        </button>
<button class="flex items-center justify-center gap-3 px-4 py-3 rounded-lg bg-surface-container-high border border-outline-variant/10 hover:bg-surface-bright transition-all text-sm font-semibold" type="button">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
                            Apple
                        </button>
</div>
</div>
</form>
<footer class="mt-12 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm">
                    New to Obsidian Cinema? 
                    <a class="text-white font-bold hover:text-primary-container transition-colors ml-1" href="#">Sign up now.</a>
</p>
</footer>
</div>
</main>
<!-- Page Footer Shell -->
<footer class="w-full flex flex-col items-center gap-6 px-8 py-12 relative z-10 mt-auto bg-[#131313]">
<div class="flex flex-wrap justify-center gap-8 md:gap-12">
<a class="text-gray-500 font-['Inter'] text-xs font-medium uppercase tracking-widest hover:text-red-600 transition-colors" href="#">Privacy Policy</a>
<a class="text-gray-500 font-['Inter'] text-xs font-medium uppercase tracking-widest hover:text-red-600 transition-colors" href="#">Terms of Service</a>

<a class="text-gray-500 font-['Inter'] text-xs font-medium uppercase tracking-widest hover:text-red-600 transition-colors" href="#">Cookies</a>

            © 2024 Obsidian Cinema. All Rights Reserved.
